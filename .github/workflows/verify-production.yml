name: Verify ANTOJO production

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/verify-production.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify production release and backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify production homepage
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 10 --retry-delay 4 'https://antojo-bio.vercel.app/' | tee homepage.html
          grep -q '/clean.css' homepage.html
          grep -q '/clean.js' homepage.html
          if grep -q 'v9-final.js' homepage.html; then
            echo 'La versión antigua sigue cargada.'
            exit 1
          fi

      - name: Verify release marker
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 10 --retry-delay 4 'https://antojo-bio.vercel.app/version' | tee version-response.json
          node -e "const fs=require('fs');const x=JSON.parse(fs.readFileSync('version-response.json','utf8'));if(!x.ok||!String(x.release||'').startsWith('clean-'))process.exit(1);console.log('Release verificada:',x.release)"

      - name: Verify backend health
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 10 --retry-delay 4 'https://antojo-bio.vercel.app/api/health' | tee health-response.json
          node -e "const fs=require('fs');const x=JSON.parse(fs.readFileSync('health-response.json','utf8'));if(!x.ok||!x.notionConfigured||!x.notionDataSourceAccessible)process.exit(1);console.log('Backend y Notion verificados')"

      - name: Publish verification summary
        run: |
          {
            echo '## ANTOJO producción verificada'
            echo ''
            echo '- Frontend limpio cargado'
            echo '- Marcador de release válido'
            echo '- Backend operativo'
            echo '- Notion conectado'
            echo '- URL: https://antojo-bio.vercel.app/'
          } >> "$GITHUB_STEP_SUMMARY"
