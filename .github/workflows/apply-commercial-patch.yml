name: Apply commercial patch

on:
  push:
    branches:
      - agent/fix-commercial-order-logic
    paths:
      - .commercial-patch/READY

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-commercial-order-logic
          fetch-depth: 0
      - name: Assemble validated source files
        shell: bash
        run: |
          set -euo pipefail
          cat .commercial-patch/clean-v2.js.gz.b64.* | base64 --decode | gzip --decompress > clean-v2.js
          cat .commercial-patch/api-submit.js.gz.b64.* | base64 --decode | gzip --decompress > api/submit.js
          node --check clean-v2.js
          node --check api/submit.js
          node tests/pricing.test.js
          node tests/api-validation.test.js
      - name: Commit assembled patch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .commercial-patch
          rm -f .github/workflows/apply-commercial-patch.yml
          git config user.name "antojo-automation"
          git config user.email "actions@users.noreply.github.com"
          git add clean-v2.js api/submit.js pricing.js commerce.css tests .github/workflows/apply-commercial-patch.yml
          git commit -m "fix: align commercial order logic"
          git push origin HEAD:agent/fix-commercial-order-logic
