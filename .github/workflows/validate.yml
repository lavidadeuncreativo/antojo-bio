name: Validate ANTOJO web app (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check clean JavaScript syntax
        run: node --check clean.js

      - name: Run clean smoke checks
        run: node tests/smoke.js
