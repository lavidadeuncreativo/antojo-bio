name: Validate ANTOJO web app

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check

      - name: Run smoke checks
        run: node tests/smoke.js

      - name: Install browser test runtime
        run: |
          npm install --no-save @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Start clean frontend
        run: |
          python3 -m http.server 4173 > /tmp/antojo-server.log 2>&1 &
          echo $! > /tmp/antojo-server.pid
          for attempt in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/antojo-server.log
          exit 1

      - name: Run real browser flows
        run: npx playwright test tests/clean-e2e.spec.js --reporter=line --workers=1

      - name: Upload browser report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clean-browser-report
          path: |
            test-results
            playwright-report
            /tmp/antojo-server.log
          if-no-files-found: ignore
          retention-days: 3
