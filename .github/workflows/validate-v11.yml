name: Validate ANTOJO v11

on:
  push:
    branches:
      - agent/antojo-v11-clean-rebuild
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build verified application
        id: build
        shell: bash
        run: |
          set +e
          node build.js > build-diagnostic.log 2>&1
          status=$?
          cat build-diagnostic.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish build diagnostic
        if: steps.build.outputs.status != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Diagnóstico automático del build'
            echo
            echo '```text'
            cat build-diagnostic.log
            echo '```'
          } > diagnostic.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file diagnostic.md
      - name: Fail invalid build
        if: steps.build.outputs.status != '0'
        run: exit 1
      - name: Validate generated JavaScript
        run: node --check dist/app.js
      - name: Validate generated files
        run: |
          test -s dist/index.html
          test -s dist/app.css
          test -s dist/app.js
          test -s dist/pricing.js
          test -d dist/renders
          ! grep -q "experience-v" dist/index.html
          grep -q "antojo-app-v11" dist/index.html
      - name: Print build inventory
        run: find dist -maxdepth 2 -type f -printf '%p %s bytes\n' | sort | head -80
