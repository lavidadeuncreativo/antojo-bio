name: Validate ANTOJO

on:
  push:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: test -s dist/index.html && test -s dist/app.css && test -s dist/app.js && test -d dist/renders
