name: Production smoke test (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke-manual
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify production without repository writes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify clean frontend
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 8 --retry-delay 4 \
            'https://antojo-bio.vercel.app/' > homepage.html
          grep -q '/clean.css' homepage.html
          grep -q '/clean.js' homepage.html
          if grep -q 'v9-final.js' homepage.html; then
            echo 'La versión antigua continúa cargada.'
            exit 1
          fi

      - name: Verify release marker
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 8 --retry-delay 4 \
            'https://antojo-bio.vercel.app/api/version' > version.json
          cat version.json
          node -e "const x=require('./version.json');if(!x.ok||!String(x.release||'').startsWith('clean-'))process.exit(1)"

      - name: Verify backend and Notion
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 8 --retry-delay 4 \
            'https://antojo-bio.vercel.app/api/health' > health.json
          cat health.json
          node -e "const x=require('./health.json');if(!x.ok||!x.notionConfigured||!x.notionDataSourceAccessible)process.exit(1)"

      - name: Summary
        run: |
          {
            echo '## ANTOJO production smoke test'
            echo ''
            echo '- Frontend limpio verificado'
            echo '- Release verificado'
            echo '- Backend y Notion verificados'
            echo '- No se crearon pedidos de prueba'
            echo '- No se escribió ningún archivo ni commit en el repositorio'
          } >> "$GITHUB_STEP_SUMMARY"
