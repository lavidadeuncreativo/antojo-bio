name: Deploy ANTOJO to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: antojo-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: la-vida-de-un-creativos-projects
      VERCEL_PROJECT: antojo-bio

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Verify deployment secret
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret VERCEL_TOKEN."
            echo "Add it in Repository Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link existing Vercel project
        run: |
          vercel link \
            --yes \
            --project "$VERCEL_PROJECT" \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"

      - name: Pull production environment
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build production output
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy production without stale cache
        id: deploy
        shell: bash
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --force --token "$VERCEL_TOKEN")
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $DEPLOY_URL"

      - name: Verify deployed release
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          echo "Waiting for production deployment..."
          sleep 8
          curl --fail --silent --show-error --retry 8 --retry-delay 4 "$DEPLOY_URL/version.json" | tee version-response.json
          node -e "const fs=require('fs'); const x=JSON.parse(fs.readFileSync('version-response.json','utf8')); if(!x.ok || !String(x.release||'').startsWith('clean-')) process.exit(1); console.log('Verified release:',x.release)"

      - name: Verify backend health
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$DEPLOY_URL/api/health" | tee health-response.json

      - name: Publish deployment summary
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          {
            echo "## ANTOJO production deployment"
            echo ""
            echo "- Deployment: $DEPLOY_URL"
            echo "- Release endpoint: $DEPLOY_URL/version.json"
            echo "- Backend health: $DEPLOY_URL/api/health"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
