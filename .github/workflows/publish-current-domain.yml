name: Verify ANTOJO production (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify current production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate repository release
        run: |
          set -euo pipefail
          node --check clean.js
          node tests/smoke.js

      - name: Verify public frontend
        run: |
          set -euo pipefail
          CACHE_BUSTER=$(date +%s)
          curl --location --fail --silent --show-error --retry 12 --retry-delay 5 \
            -H 'Cache-Control: no-cache' \
            "https://antojo-bio.vercel.app/?release=$CACHE_BUSTER" > public-homepage.html
          grep -q 'clean-20260717-1' public-homepage.html
          grep -q 'id="menu"' public-homepage.html
          if grep -q 'class="bottom-nav"' public-homepage.html; then
            echo 'The old three-screen navigation is still in production.'
            exit 1
          fi

      - name: Verify public release and backend
        run: |
          set -euo pipefail
          curl --location --fail --silent --show-error --retry 12 --retry-delay 5 \
            'https://antojo-bio.vercel.app/api/version' > public-version.json
          node -e "const x=require('./public-version.json');if(!x.ok||x.release!=='clean-20260717-1')process.exit(1);console.log('Public release:',x.release)"
          curl --location --fail --silent --show-error --retry 10 --retry-delay 4 \
            'https://antojo-bio.vercel.app/api/health' > public-health.json
          node -e "const x=require('./public-health.json');if(!x.ok||!x.ready||!x.notionConfigured||!x.notionDataSourceAccessible)process.exit(1);console.log('Backend and Notion ready')"

      - name: Summary
        run: |
          {
            echo '## ANTOJO production verified'
            echo ''
            echo '- Public domain: https://antojo-bio.vercel.app/'
            echo '- Single-page frontend verified'
            echo '- Backend and Notion verified'
          } >> "$GITHUB_STEP_SUMMARY"
